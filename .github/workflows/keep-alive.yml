name: Keep Render Alive

on:
  schedule:
    - cron: '0 3 26 * *'  # 3:00 AM UTC on the 26th — 30 min before the reminder fires
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          URL="${{ vars.RENDER_URL }}"
          if [ -z "$URL" ]; then
            echo "RENDER_URL variable not set, skipping"
            exit 0
          fi
          echo "Pinging $URL..."
          curl -sf --max-time 60 "$URL" -o /dev/null && echo "App is awake" || echo "Ping failed (app may still be waking)"
